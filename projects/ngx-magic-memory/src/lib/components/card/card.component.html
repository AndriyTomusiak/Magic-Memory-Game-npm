<div
  class="card"
  [class.flipped]="card().flipped"
  [class.matched]="card().matched"
  (click)="onClick()"
>
  <div class="card-inner">
    <div class="card-front">
      @if (isImage(cardBack())) {
        <img class="card-img" [src]="cardBack()" alt="card back" />
      } @else {
        <span class="card-back-content">{{ cardBack() }}</span>
      }
    </div>
    <div class="card-back">
      @if (isImage(card().content)) {
        <img class="card-img" [src]="card().content" alt="card" />
      } @else {
        <span class="card-content">{{ card().content }}</span>
      }
    </div>
  </div>
</div>
